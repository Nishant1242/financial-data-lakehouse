services:

  minio:
    image: minio/minio:latest
    container_name: lakehouse_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15
    container_name: lakehouse_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lakehouse
      POSTGRES_USER: lakehouse_user
      POSTGRES_PASSWORD: lakehouse_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse_user -d lakehouse"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    container_name: lakehouse_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:
  postgres_data:
  mongo_data:

networks:
  lakehouse_network:
    driver: bridge
