services:

  minio:
    image: minio/minio:latest
    container_name: lakehouse_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15
    container_name: lakehouse_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lakehouse
      POSTGRES_USER: lakehouse_user
      POSTGRES_PASSWORD: lakehouse_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse_user -d lakehouse"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:7
    container_name: lakehouse_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: lakehouse_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "echo", "ruok"]
      interval: 30s
      timeout: 10s
      retries: 3
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: lakehouse_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow_postgres:
    image: postgres:15
    container_name: lakehouse_airflow_db
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow_init:
    image: apache/airflow:2.8.1
    container_name: lakehouse_airflow_init
    depends_on:
      airflow_postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@lakehouse.com"
    networks:
      - lakehouse_network

  airflow:
    image: apache/airflow:2.8.1
    container_name: lakehouse_airflow
    depends_on:
      airflow_postgres:
        condition: service_healthy
      airflow_init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "lakehouse_secret_key_2026"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET_BRONZE: "bronze"
      MINIO_BUCKET_SILVER: "silver"
      MINIO_BUCKET_GOLD: "gold"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "lakehouse"
      POSTGRES_USER: "lakehouse_user"
      POSTGRES_PASSWORD: "lakehouse_pass"
      MONGO_URI: "mongodb://mongodb:27017"
      MONGO_DB: "lakehouse_client"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_TOPIC_TRADES: "trades"
    volumes:
      - ../orchestration/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ../services:/opt/airflow/services
      - ../lakehouse_dbt:/opt/airflow/lakehouse_dbt
    command: >
      bash -c "airflow scheduler &
               airflow webserver --port 8080"
    networks:
      - lakehouse_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  minio_data:
  postgres_data:
  mongo_data:
  kafka_data:
  airflow_db_data:
  airflow_logs:

networks:
  lakehouse_network:
    driver: bridge